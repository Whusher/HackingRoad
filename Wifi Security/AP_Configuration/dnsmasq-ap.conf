# Interface binding
interface=wlan0ap
bind-interfaces

# ---------- DHCP ----------
dhcp-range=192.168.1.10,192.168.1.200,255.255.255.0,24h
dhcp-option=3,192.168.1.1
dhcp-option=6,192.168.1.1
dhcp-option=28,192.168.1.255

# ---------- DNS ----------
no-resolv
log-queries

# ---- Internet services
server=8.8.8.8
server=1.1.1.1



# Redirect ALL domains to captive portal
#address=/#/192.168.1.1




# ---------- Logging ----------
log-dhcp
log-facility=/var/log/dnsmasq-ap.log
